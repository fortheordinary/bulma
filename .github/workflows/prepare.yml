name: Monorepo Deploy

on:
  push:
    branches:
      - main
  # Manual deploy — paths-filter is bypassed; the inputs decide what ships.
  # Use to (re)deploy when the triggering change didn't touch apps/* (e.g. a
  # CI-only fix) or to force a redeploy.
  workflow_dispatch:
    inputs:
      api:
        description: Deploy apps/api
        type: boolean
        default: true
      www:
        description: Deploy apps/www
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    name: Path filter
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.decide.outputs.api }}
      www: ${{ steps.decide.outputs.www }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'push'
        with:
          base: ${{ github.ref }}
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'bun.lock'
              - 'package.json'
              - 'turbo.json'
            www:
              - 'apps/www/**'
              - 'packages/**'
              - 'bun.lock'
              - 'package.json'
              - 'turbo.json'
      - id: decide
        # On workflow_dispatch use the inputs; on push use the path filter.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "api=${{ inputs.api }}" >> "$GITHUB_OUTPUT"
            echo "www=${{ inputs.www }}" >> "$GITHUB_OUTPUT"
          else
            echo "api=${{ steps.filter.outputs.api }}" >> "$GITHUB_OUTPUT"
            echo "www=${{ steps.filter.outputs.www }}" >> "$GITHUB_OUTPUT"
          fi

  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  api-deploy:
    needs: [changes, ci]
    if: ${{ needs.changes.outputs.api == 'true' }}
    secrets: inherit
    uses: ./.github/workflows/deploy.yml
    with:
      APP_NAME: api

  www-deploy:
    needs: [changes, ci]
    if: ${{ needs.changes.outputs.www == 'true' }}
    secrets: inherit
    uses: ./.github/workflows/deploy.yml
    with:
      APP_NAME: www
