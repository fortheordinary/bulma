name: Verify commit author

# Server-side gate: every commit (author AND committer) must be agent@bul.ma.
# Local .githooks/pre-commit + pre-push enforce this before code leaves a machine;
# this catches anything that bypassed them (e.g. web edits, --no-verify).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  author:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: All commits authored by agent@bul.ma
        env:
          REQUIRED: agent@bul.ma
          EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          zero="0000000000000000000000000000000000000000"
          if [ "$EVENT" = "pull_request" ]; then
            range="$PR_BASE..$PR_HEAD"
          elif [ "$PUSH_BEFORE" = "$zero" ]; then
            range="$PUSH_AFTER"            # first push / new branch: check full history
          else
            range="$PUSH_BEFORE..$PUSH_AFTER"
          fi
          bad=$(git log --format='%H %ae %ce' $range | awk -v r="$REQUIRED" '$2!=r || $3!=r {print}')
          if [ -n "$bad" ]; then
            echo "::error::commits not authored/committed by $REQUIRED:"
            echo "$bad"
            exit 1
          fi
          echo "✓ all commits in $range are $REQUIRED"
