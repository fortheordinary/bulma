name = "bulma-www"
compatibility_date = "2025-01-01"

# Static SPA served from Workers (no Worker script). `single-page-application`
# rewrites non-asset requests to `index.html` so client-side routing works.
[assets]
directory = "dist"
not_found_handling = "single-page-application"

# Custom domain — wrangler binds bul.ma (apex) to this Worker and manages the DNS
# record + cert on deploy. Requires the CI token to have Workers Routes:Edit and
# Zone DNS:Edit on the bul.ma zone.
[[routes]]
pattern = "bul.ma"
custom_domain = true

[observability]
enabled = true

[vars]
ENVIRONMENT = "development"
